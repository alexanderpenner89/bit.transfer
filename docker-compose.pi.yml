services:

  # ── DevTools / Backend ────────────────────────────────────────────────────────
  devtools:
    build:
      context: ./backend
      dockerfile: Dockerfile.devtools
    container_name: bit-transfer-devtools
    ports:
      - "8000:8000"
    env_file: .env
    command: ["uvicorn", "devtools.server:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - devtools_runs:/app/data/dev_runs
    restart: always

  # ── Ghost CMS (Frontend) ──────────────────────────────────────────────────────
  ghost:
    image: ghost:5-alpine
    container_name: bit-transfer-ghost
    ports:
      - "2368:2368"
    environment:
      NODE_ENV: production
      url: ${GHOST_URL:-http://bit.transfer}
      database__client: mysql
      database__connection__host: mysql
      database__connection__port: 3306
      database__connection__user: root
      database__connection__password: ${MYSQL_ROOT_PASSWORD:-ghostpass}
      database__connection__database: ghost
    volumes:
      - ghost_content:/var/lib/ghost/content
      - ./ghost/routes.yaml:/var/lib/ghost/content/settings/routes.yaml
      - ./theme/bit-transfer:/var/lib/ghost/content/themes/bit-transfer
    depends_on:
      mysql:
        condition: service_healthy
    restart: always

  mysql:
    image: mysql:8.0
    container_name: bit-transfer-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ghostpass}
      MYSQL_DATABASE: ghost
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-ghostpass}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always

volumes:
  devtools_runs:
  ghost_content:
  mysql_data:
