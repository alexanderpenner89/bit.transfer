upstream ghost {
    server ghost:2368;
}

upstream devtools {
    server devtools:8000;
}

server {
    listen 80;
    server_name alexanderpenner.de www.alexanderpenner.de;

    # /devtools → FastAPI backend
    location /devtools/ {
        proxy_pass http://devtools/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support (for streaming endpoints)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # Everything else → Ghost blog
    location / {
        proxy_pass http://ghost;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
